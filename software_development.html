		<script type="text/javascript">
			$(document).ready(function () {
				getRepositories();
			});
			
			function getRepositories(repository) {
				$.ajax({
					url: "https://api.github.com/users/carlosalbertoxw/repos",
					method: "GET",
					async: true,
					success: function (result, status, xhr) {
						$('#proyectos').append("<br><h5>Servicios REST</h5>");
						$('#proyectos').append(getRepository(result,'CRUD-Servicios-REST-Java-Spring'));
						$('#proyectos').append(getRepository(result,'CRUD-Servicios-REST-ASP.NET-CSharp'));
						$('#proyectos').append(getRepository(result,'CRUD-Servicios-REST-PHP-OO'));
						$('#proyectos').append("<br><h5>Aplicaciones web</h5>");
						$('#proyectos').append(getRepository(result,'Encuestas-JSPs-Servlets'));
						$('#proyectos').append(getRepository(result,'Encuestas-ASP.NET-CSharp'));
						$('#proyectos').append(getRepository(result,'Encuestas-PHP-OO'));
						$('#proyectos').append("<br><h5>Android</h5>");
						$('#proyectos').append(getRepository(result,'CRUDAndroidServiciosREST-RT'));
						$('#proyectos').append(getRepository(result,'CRUD-Android-SQLite'));
						$('#proyectos').append("<br><h5>Ejercicios</h5>");
						$('#proyectos').append(getRepository(result,'EjerciciosJava'));
						$('#proyectos').append(getRepository(result,'EjerciciosDotNetCSharp'));
						$('#proyectos').append(getRepository(result,'EjerciciosPHP'));
						$('#proyectos').append(getRepository(result,'EjerciciosJavaScript'));
						$('#proyectos').append("<br><h5>Ejemplos JWT</h5>");
						$('#proyectos').append(getRepository(result,'Ejemplos-JWT-Java'));
						$('#proyectos').append(getRepository(result,'Ejemplos-JWT-DotNet-CSharp'));
						$('#proyectos').append(getRepository(result,'Ejemplos-JWT-PHP'));
						$('#proyectos').append(getRepository(result,'EjemplosJWTAndroid'));
						$('#proyectos').append("<br><h5>Java SE</h5>");
						$('#proyectos').append(getRepository(result,'JavaSE-DB4O'));
						$('#proyectos').append(getRepository(result,'JavaSE-XML-File'));
						$('#proyectos').append("<br><h5>Proyectos Java</h5>");
						$('#proyectos').append(getRepository(result,'JavaQuartzScheduler'));
						$('#proyectos').append(getRepository(result,'JavaServletFilter'));
						$('#proyectos').append("<br><h5>Proyectos JavaScript</h5>");
						$('#proyectos').append(getRepository(result,'Chat-nodejs-socketio'));
						$('#proyectos').append(getRepository(result,'Api-restful-favoritos'));
						$('#proyectos').append(getRepository(result,'Favoritos'));
					},
					error: function (xhr, status, error) {
						$('#proyectos').append("Error al obtener repositorios de github.");
					}
				});
			}
			
			function getRepository(result,repository) {
				var t='';
				for(var i=0;i<result.length;i++){
					if(repository==result[i].name){
						t = '<div><h5><a target="_blank" class="green-text" href="'+result[i].html_url+'">'+result[i].name+'</a></h5>'+result[i].description+'</div>';
						break;
					}
				}
				return t;
			}
		</script>
